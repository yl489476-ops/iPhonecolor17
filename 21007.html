<html>

<head>

<style>
#bto{
   background-color:#E6E6E6;
}
#bto{
   background-color:#F77E39;
}
#btb{
   background-color:#48547E;
}
.bts{
   width:100;
   height:20;
   border: 2px solid #000000;
   border-radius: 100px;
}
</style>

<script>
function showColor(cid){
   if(cid==1)
   {
      document.getElementById("iphonecolor").innerHTML="銀色";
      document.getElementById("iphonephoto").setAttribute("src","iphone17s.jpg");
   }
   else if(cid==2)
   { 
      document.getElementById("iphonecolor").innerHTML="宇宙橙色";
      document.getElementById("iphonephoto").setAttribute("src","iphone17o.jpg");
   }
   else if(cid==3)
   {   
      document.getElementById("iphonecolor").innerHTML="藏藍色";
      document.getElementById("iphonephoto").setAttribute("src","iphone17b.jpg");
   }
}
</script>

</head>

<body>

<center>

<h1 style="color:#ff0000;">選你喜歡的顏色</h1>

<br>

<div id="iphonecolor">？</div>

<img id="iphonephoto" src="t:\iPhoneColor17\iphone17pro.jpg" height="360">

<br><br>

<input type="button" id="btw" class="bts" onclick="javascript:{showColor(1);}"></input>
<input type="button" id="bto" class="bts" onclick="javascript:{showColor(2);}"></input>
<input type="button" id="btb" class="bts" onclick="javascript:{showColor(3);}"></input>

</center>

</body>

</html>
